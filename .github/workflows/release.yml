name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd src
          npm install

      - name: Build EXE
        run: |
          cd src
          npx @yao-pkg/pkg -t node22-win-x64 index.js -o ..\CasinoBot.exe

      - name: Add icon
        shell: pwsh
        run: |
          npm install -g rcedit
          rcedit CasinoBot.exe --set-icon icon.ico `
            --set-version-string "FileDescription" "Casino Bonus Monitor" `
            --set-version-string "ProductName" "Casino Bonus Monitor"

      - name: Build Installer
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -Version $env:GITHUB_REF_NAME.Replace('v','')

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            CasinoBot.exe `
            build/CasinoBot-Setup-*.exe `
            --title $env:GITHUB_REF_NAME `
            --notes "Auto-built from commit $env:GITHUB_SHA"
