name: Build CasinoBot.exe
on:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --icon=assets/icon.ico --add-data "license_keys.json;." --name "CasinoBot" gui_app.py
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CasinoBot.exe
