name: Build CasinoBot.exe
on:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build exe
        run: pyinstaller --onefile --windowed --icon=assets/icon.ico --name CasinoBot --add-data "combined.py;." --add-data "sites.json;." --add-data "license_keys.json;." --add-data "site_xpaths.json;." gui_app.py
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CasinoBot.exe
